name: push.yml
on:
  push:
jobs:
  step:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run tests
        run: mvn test
    
